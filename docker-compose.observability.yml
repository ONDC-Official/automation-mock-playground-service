# Observability stack — run alongside the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# Logs reach Loki via the app's winston-loki transport (LOKI_HOST). Prometheus
# scrapes the app's /metrics endpoint. Grafana auto-provisions both datasources
# and the ONDC dashboards.
services:
    prometheus:
        image: prom/prometheus:v2.54.1
        container_name: ondc-prometheus
        restart: unless-stopped
        ports:
            - '9090:9090'
        volumes:
            - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
            - prometheus-data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=15d'
            - '--web.enable-lifecycle'
        # Lets Prometheus reach an app running on the host (npm run dev).
        # No-op on Docker Desktop (Mac/Win); required on Linux.
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        networks:
            - ondc-network

    loki:
        image: grafana/loki:3.2.1
        container_name: ondc-loki
        restart: unless-stopped
        ports:
            - '3100:3100'
        volumes:
            - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
            - loki-data:/loki
        command: -config.file=/etc/loki/local-config.yaml
        networks:
            - ondc-network

    grafana:
        image: grafana/grafana:11.2.0
        container_name: ondc-grafana
        restart: unless-stopped
        ports:
            - '${GRAFANA_PORT:-3005}:3000'
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
            GF_USERS_ALLOW_SIGN_UP: 'false'
        volumes:
            - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        depends_on:
            - prometheus
            - loki
        networks:
            - ondc-network

volumes:
    prometheus-data:
        driver: local
    loki-data:
        driver: local
    grafana-data:
        driver: local
