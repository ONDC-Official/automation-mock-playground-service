global:
    scrape_interval: 15s
    evaluation_interval: 15s

rule_files:
    - /etc/prometheus/alerts.yml

scrape_configs:
    # Target the app's /metrics. Use `host.docker.internal:3000` when the app
    # runs on the HOST (npm run dev) — works on Docker Desktop and, with the
    # `extra_hosts` mapping in docker-compose.observability.yml, on Linux too.
    # If you run the app INSIDE compose instead, switch this to `app:3000`.
    - job_name: 'ondc-mock-service'
      metrics_path: /metrics
      static_configs:
          - targets: ['host.docker.internal:3000']
            labels:
                service: ondc-playground-mock-service

    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']
