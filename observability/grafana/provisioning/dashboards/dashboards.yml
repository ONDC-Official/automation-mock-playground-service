apiVersion: 1

providers:
    - name: 'ONDC Mock Dashboards'
      orgId: 1
      folder: 'ONDC Mock Service'
      type: file
      disableDeletion: false
      updateIntervalSeconds: 30
      allowUiUpdates: true
      options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
